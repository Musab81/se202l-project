name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Run pytest ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest test_app.py -v --tb=short

  # ── Job 2: Build Docker image & verify health ──────────────────────────────
  build-docker:
    name: Build & Health Check
    runs-on: ubuntu-latest
    needs: test          # only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t physics-sandbox:ci .

      - name: Run container
        run: |
          docker run -d --name sandbox -p 5000:5000 physics-sandbox:ci
          sleep 5

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          echo "Health endpoint returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED"
            docker logs sandbox
            exit 1
          fi
          echo "Health check PASSED"

      - name: Stop container
        if: always()
        run: docker stop sandbox && docker rm sandbox
